spring:
  application:
    name: corebanking-posting-manager
  config:
    import: optional:file:./application-local.yml
  datasource:
    url: jdbc:postgresql://localhost:5432/posting_manager
    username: posting
    password: posting
    hikari:
      maximum-pool-size: 50
      minimum-idle: 10
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc.batch_size: 50
        order_inserts: true
        order_updates: true
  flyway:
    enabled: true
    baseline-on-migrate: true
  kafka:
    bootstrap-servers: localhost:9092
    producer:
      acks: all
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        enable.idempotence: true
        max.in.flight.requests.per.connection: 5
        spring.json.add.type.headers: false
    consumer:
      group-id: posting-manager
      auto-offset-reset: earliest

server:
  port: 8081

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  metrics:
    distribution:
      percentiles-histogram:
        http.server.requests: true
        posting.duration: true

posting:
  concurrency:
    mode: PESSIMISTIC   # NONE | PESSIMISTIC | OPTIMISTIC | STRIPED | EXECUTOR
    striped-locks: 1024
    executor-pool-size: 256
  ledger:
    base-url: http://localhost:8080
    connect-timeout: 500ms
    read-timeout: 2s
  outbox:
    poll-interval: 200ms
    batch-size: 100

resilience4j.retry:
  instances:
    ledger:
      max-attempts: 3
      wait-duration: 100ms
      exponential-backoff-multiplier: 2
      retry-exceptions:
        - org.springframework.web.client.ResourceAccessException
        - com.yizhang.banking.posting.client.LedgerServerException

logging:
  level:
    com.yizhang.banking.posting: DEBUG
